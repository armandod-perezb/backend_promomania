# ============================================
# DOCKER COMPOSE - STACK COMPLETO promomania
# Sistema de Horarios Universidad Libre
# ============================================

name: promomania

services:
  # ==========================================
  # BASE DE DATOS POSTGRESQL
  # ==========================================
  db:
    container_name: promo_postgres
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mypostgresdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - promomania_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mypostgresdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND DJANGO
  # ==========================================
  backend:
    container_name: promomania-backend
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      # Código fuente montado para hot-reload
      - ./backend:/app
    environment:
      # Database (usa los mismos valores que el servicio db)
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: mypostgresdb
      # Django Settings
      DJANGO_SECRET_KEY: django-insecure-solo-desarrollo-local
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOW_ALL_ORIGINS: "True"
      CORS_ALLOW_CREDENTIALS: "True"
      CSRF_TRUSTED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8001,http://127.0.0.1:8001"
      # Python
      PYTHONUNBUFFERED: "1"
    # Comando para desarrollo local (sobrescribe el CMD del Dockerfile)
    command: >
      sh -c 'until pg_isready -h $${DB_HOST} -p $${DB_PORT} -U $${DB_USER}; do
        echo "Waiting for database...";
        sleep 2;
      done &&
      echo "Database is ready!" &&
      python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - promomania_network

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  postgres_data:
    name: promomania_postgres_data
    driver: local

# ==========================================
# RED COMPARTIDA
# ==========================================
networks:
  promomania_network:
    name: promomania_network
    driver: bridge